<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>OpenGameInstaller</title>

    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <script>
      (function () {
        var t = 'system'; // Default fallback
        if (window.electronAPI && typeof window.electronAPI.getInitialTheme === 'function') {
          try {
            t = window.electronAPI.getInitialTheme() || 'system';
          } catch (e) {}
        }
        // Handle system theme
        if (t === 'system') {
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            t = 'dark';
          } else {
            t = 'light';
          }
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <script type="module" src="/src/frontend/main.ts"></script>
  </body>
</html>
